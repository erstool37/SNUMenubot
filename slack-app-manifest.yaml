display_information:
  name: SNU Menu Bot
  description: Private SNU cafeteria menu lookup.
features:
  bot_user:
    display_name: SNU Menu Bot
    always_online: false
  slash_commands:
    - command: /snumenu
      url: https://snumenubot.whddnjs472.workers.dev/slack/commands
      description: Show SNU cafeteria menu.
      usage_hint: lunch | dinner | time
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
