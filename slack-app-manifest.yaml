display_information:
  name: SNU Menu Bot
  description: Private SNU cafeteria menu lookup.
features:
  slash_commands:
    - command: /snumenu
      url: https://YOUR-WORKER.workers.dev/slack/commands
      description: Show SNU cafeteria menu.
      usage_hint: lunch | dinner | time
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
